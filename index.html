<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gym Logbook Import</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f4f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const data = urlParams.get('data');
            
            if (data) {
                // Tentativo di apertura app
                const appUrl = "gymapp://import?data=" + encodeURIComponent(data);
                window.location.href = appUrl;

                // Se dopo 3 secondi non succede nulla, mostriamo il tasto manuale
                setTimeout(function() {
                    document.getElementById('status').innerHTML = 
                        "<h3>Se l'app non si è aperta automaticamente:</h3>" +
                        "<a href='" + appUrl + "' style='display:inline-block; padding:15px 25px; background:#3498db; color:white; text-decoration:none; border-radius:8px;'>Apri Gym Logbook</a>";
                }, 3000);
            } else {
                document.getElementById('status').innerHTML = "<h3>Errore: Nessun dato trovato nel link.</h3>";
            }
        };
    </script>
</head>
<body>
    <div id="status">
        <h2>Ricezione scheda in corso...</h2>
        <div class="loader"></div>
        <p>Ti stiamo portando nell'app Gym Logbook.</p>
    </div>
</body>
</html>
