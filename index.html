<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gym Logbook - Importa Scheda</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f4f4f9; color: #333; }
        .btn { display: block; width: 100%; max-width: 300px; margin: 15px auto; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .btn-app { background: #3498db; color: white; }
        .btn-web { background: #2ecc71; color: white; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Ricezione scheda...</h2>
    <div id="loader" class="loader"></div>
    <div id="options" style="display:none;">
        <p>Dove vuoi aprire la scheda?</p>
        <a id="linkApp" href="#" class="btn btn-app">Android</a>
        <a id="linkWeb" href="#" class="btn btn-web">Iphone</a>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const data = urlParams.get('data');
    if (data) {
        // Trucco del redirect: proviamo ad aprire l'app tramite HTTPS
        // Se l'app è configurata con l'App Link, questo la sveglierà
        const targetUrl = window.location.href; 
        
        // Se l'utente clicca il tasto, ri-puntiamo a noi stessi 
        // ma Android a quel punto dovrebbe suggerire l'app
        document.getElementById('openAppBtn').href = targetUrl;
    }
</script>
</body>
</html>
