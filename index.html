<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background: #fafafa; }
        .btn { display: block; width: 100%; max-width: 300px; margin: 20px auto; padding: 20px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 18px; }
        .btn-apk { background: #007AFF; color: white; border: none; cursor: pointer; }
        .btn-web { background: #e9ecef; color: #333; }
    </style>
</head>
<body>
    <h2>Importazione Scheda</h2>
    <p>Scegli la destinazione:</p>

    <button onclick="openApp()" class="btn btn-apk">APRI NELL'APP (APK)</button>
    <a id="webLink" href="#" class="btn btn-web">Usa versione Web</a>

    <script>
        const data = new URLSearchParams(window.location.search).get('data');
        const webUrl = "https://rdagmr98.github.io/gymapplogbook/?data=" + data;
        document.getElementById('webLink').href = webUrl;

        function openApp() {
            // Tentativo 1: Usiamo il link HTTPS stesso. 
            // Se Android è configurato, questo DEVE aprire l'app.
            window.location.href = window.location.href; 
            
            // Tentativo 2: Se dopo 500ms siamo ancora qui, proviamo lo schema custom
            setTimeout(() => {
                window.location.href = "gymapp://import?data=" + data;
            }, 500);
        }
    </script>
</body>
</html>
